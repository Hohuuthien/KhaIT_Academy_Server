name: Discord Notification

on:
  push:
    branches: [ "main" ]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "content": "🚀 New push by ${{ github.actor }} in ${{ github.repository }}"
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}
