server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/khait_academy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # 🔥 thêm cái này để đảm bảo Spring load datasource sớm
  sql:
    init:
      mode: always

app:
  jwt:
    # ⚠️ dùng plain text, KHÔNG cần base64
    secret: 12345678901234567890123456789012
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  cors:
    allowed-origins: http://localhost:5173,https://khaitacademy.com
